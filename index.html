<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職涯導航儀 | 浮島深聊 fudao-talk</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1628; --card: #0e2240; --card2: #112544; --accent: #4fa3e0; --text: #d4e8f5; --dim: #7aa8cc; --border: #1a3a5c;
    --line: #06C755; --threads: #ffffff; --fb: #1877F2;
    --ig-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  }
  body { 
    background-color: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; 
    margin: 0; display: flex; flex-direction: column; min-height: 100vh;
    background-image: radial-gradient(circle at 50% 0%, rgba(79, 163, 224, 0.05) 0%, transparent 70%);
  }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .brand-group { display: flex; align-items: center; gap: 8px; }
  .about-link { font-size: 11px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; transition: 0.3s; }
  .about-link:hover { background: rgba(79, 163, 224, 0.1); }

  .trust-anchor { background: rgba(79, 163, 224, 0.1); border-bottom: 1px solid rgba(79, 163, 224, 0.2); padding: 8px 0; text-align: center; font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  
  main { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 15px; flex: 1; }
  .card-shell { border-radius: 16px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeIn 0.5s; }
  .card-top { background: var(--card); padding: 25px 20px; text-align: center; border: 1px solid var(--border); border-bottom: none; border-radius: 16px 16px 0 0; }
  .card-body { background: var(--card2); padding: 20px; border: 1px solid var(--border); border-radius: 0 0 16px 16px; }
  
  .opt-btn { background: #0d1e38; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 15px; transition: 0.2s; }
  .opt-btn:hover { border-color: var(--accent); background: #112848; transform: translateX(5px); }
  
  .cta-btn { display: block; background: var(--accent); color: white; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; font-size: 17px; box-shadow: 0 8px 20px rgba(79,163,224,0.3); transition: 0.3s; }
  .cta-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

  /* 分享按鈕 */
  .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
  .share-item { border: 1px solid var(--border); padding: 10px 5px; border-radius: 8px; font-size: 10px; color: var(--dim); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; background: rgba(255,255,255,0.02); text-decoration: none; }
  .share-item:hover { background: rgba(255,255,255,0.05); }
  .icon-line { color: var(--line); font-weight: bold; }
  .icon-threads { color: var(--threads); font-weight: bold; }
  .icon-fb { color: var(--fb); font-weight: bold; }
  .icon-ig { background: var(--ig-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }

  .privacy-sticky { margin: 15px auto; text-align: center; font-size: 10px; opacity: 0.4; line-height: 1.6; padding: 0 20px; }
  footer { margin-top: 40px; padding: 30px 20px; text-align: center; border-top: 1px solid var(--border); opacity: 0.6; font-size: 11px; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <header>
    <div class="brand-group">
      <span style="font-size: 18px;">🏝️</span>
      <div>
        <div style="font-weight: 900; font-size: 14px;">浮島深聊</div>
        <div style="font-size: 8px; font-family: 'DM Mono'; opacity: 0.5;">fudao-talk.lab</div>
      </div>
    </div>
    <a href="https://readdy.cc/preview/c0d8649c-b49c-415a-9346-9694f158f6f6/7217984/about" class="about-link" target="_blank">關於團隊</a>
  </header>

  <div class="trust-anchor">
    🛡️ 捷啟智慧科技 JC Tech 官方開發｜台南在地職涯研發團隊
  </div>

  <main id="app"></main>

  <div class="privacy-sticky">
    🔒 本診斷全程匿名，無需註冊、不蒐集個資，請放心測試。
  </div>

  <footer>
    <div style="font-weight: 700;">浮島深聊 · fudao-talk</div>
    <div style="margin-top: 4px;">技術支持：捷啟智慧科技 JC Tech</div>
    <div style="margin-top: 10px; opacity: 0.5; font-size: 9px;">© 2026 JC Tech. All Rights Reserved.</div>
  </footer>

  <script>
    const TARGET_URL = "https://readdy.cc/preview/c0d8649c-b49c-415a-9346-9694f158f6f6/7217984";
    const questions = [
      { q: "您目前的求職狀態？", opts: ["新鮮人（應屆畢業）", "在職中，觀望新機會", "考慮離職中", "積極投遞履歷中", "準備面試中", "已拿到 Offer"], emoji: "⚓" },
      { q: "目前最感到困擾的是？", opts: ["薪資行情不明", "履歷投遞沒回音", "職涯方向迷茫", "面試表現不穩", "不清楚離職權益"], emoji: "🌊" },
      { q: "您的工作年資？", opts: ["0年", "1–3年", "3–5年", "5–10年", "10年以上"], emoji: "🗺️" }
    ];

    let currentStep = 0;
    let answers = [];

    function render() {
      const q = questions[currentStep];
      document.getElementById('app').innerHTML = `
        <div class="card-shell">
          <div class="card-top">
            <div style="font-size: 38px; margin-bottom: 10px;">${q.emoji}</div>
            <div style="font-size: 20px; font-weight: 900; line-height: 1.4;">${q.q}</div>
          </div>
          <div class="card-body">
            ${q.opts.map((o, i) => `<div class="opt-btn" onclick="handleSelect(${i})">${o}<span>→</span></div>`).join('')}
            <div style="margin-top: 15px; font-size: 10px; opacity: 0.3; text-align: center; letter-spacing: 2px;">STEP 0${currentStep+1} / 03</div>
          </div>
        </div>
      `;
    }

    function handleSelect(index) {
      answers.push(index);
      if (currentStep < questions.length - 1) {
        currentStep++; render();
      } else {
        showLoading();
      }
    }

    function showLoading() {
      document.getElementById('app').innerHTML = `
        <div style="padding: 100px 0; text-align: center;">
            <div style="width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            <p style="margin-top: 20px; opacity: 0.6; font-size: 13px;">正在由 JC Tech 引擎分析您的職涯數據...</p>
        </div>`;
      setTimeout(showResult, 1200);
    }

    function showResult() {
      const [q1, q2, q3] = answers;
      let res = { title: "職涯探索者", risk: 5, reason: "您目前處於穩健階段，適合優化現有技能。", encourage: "平靜的海面練不出精悍的水手。" };

      // 動態邏輯判斷
      if (q1 === 2 || q2 === 2) { 
        res = { title: "方向迷茫者", risk: 8, reason: "核心焦慮來自於定位模糊，建議透過深度測驗釐清市場優勢。", encourage: "大海雖然遼闊，但總有一座島嶼屬於你。" };
      } else if (q1 === 0) {
        res = { title: "職場新鮮人", risk: 6, reason: "剛踏入航道，需要建立精準的履歷地圖與市場認知。", encourage: "勇敢出發，風會帶你去想去的地方。" };
      } else if (q1 === 3 || q2 === 1) {
        res = { title: "積極轉職者", risk: 7, reason: "投遞頻率高但轉化率低，目前需要的是優化個人品牌敘事。", encourage: "再堅持一下，下一個浪潮就是機會。" };
      } else if (q1 === 4 || q2 === 3) {
        res = { title: "面試攻堅者", risk: 9, reason: "實力已獲認可，目前的關鍵在於臨場應變與談薪策略。", encourage: "最後一哩路，穩住就能抵達目的地。" };
      } else if (q3 >= 3) {
        res = { title: "資深領航員", risk: 4, reason: "具備實戰經驗，目前應專注於高階獵才或管理層次的躍升。", encourage: "您的經驗就是最強大的羅盤。" };
      }

      let segs = "";
      for(let i=1; i<=10; i++) {
        const color = i <= 4 ? "#4cc98a" : (i <= 7 ? "#4fa3e0" : "#e05c5c");
        segs += `<div style="height: 8px; width: 30px; border-radius: 2px; background:${i<=res.risk ? color : 'rgba(255,255,255,0.05)'}; box-shadow:${i<=res.risk ? '0 0 8px '+color+'44' : 'none'}"></div>`;
      }

      const shareText = `我在「職涯導航儀」測出的結果是：${res.title}（焦慮指數 ${res.risk}/10）！你也來試試看吧（全程匿名）：`;
      const encodedText = encodeURIComponent(shareText);
      const encodedUrl = encodeURIComponent(window.location.href);

      document.getElementById('app').innerHTML = `
        <div class="card-shell">
          <div class="card-top">
            <div style="font-size: 40px;">🎯</div>
            <div style="color:var(--accent); font-size:10px; font-weight:bold; letter-spacing:3px; margin-top:10px;">✦ 診斷完成 ✦</div>
            <div style="font-size: 28px; font-weight: 900; margin: 10px 0;">${res.title}</div>
            <p style="font-size: 14px; opacity: 0.7; line-height: 1.6;">${res.reason}</p>
          </div>
          <div class="card-body">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px; opacity:0.6;">
              <span>⚡ 緊迫指數評估</span><span style="color:var(--accent); font-weight:bold;">${res.risk} / 10</span>
            </div>
            <div style="display:flex; gap:4px; justify-content:center; margin-bottom:20px;">${segs}</div>
            
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom:20px; text-align: left; border-left: 3px solid var(--accent); font-size:13px; font-style:italic; opacity:0.8;">
                "${res.encourage}"
            </div>

            <div style="font-size: 11px; color: var(--accent); text-align: center; margin-bottom: 8px; opacity: 0.8;">點擊開啟完整官方報告（安全、免註冊）</div>
            <a href="${TARGET_URL}" target="_blank" class="cta-btn">查看完整報告 →</a>

            <div style="text-align: center; margin-top: 25px;">
                <div style="font-size: 11px; opacity: 0.4; margin-bottom: 10px;">—— 匿名分享診斷結果 ——</div>
                <div class="share-grid">
                    <a class="share-item" href="https://line.me/R/msg/text/?${encodedText}${encodedUrl}" target="_blank"><span class="icon-line">LINE</span>好友</a>
                    <a class="share-item" href="https://www.threads.net/intent/post?text=${encodedText}${encodedUrl}" target="_blank"><span class="icon-threads">Threads</span>串文</a>
                    <div class="share-item" onclick="shareToIG('${res.title}', ${res.risk})"><span class="icon-ig">Instagram</span>限動</div>
                    <a class="share-item" href="https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}" target="_blank"><span class="icon-fb">FB</span>貼文</a>
                </div>
            </div>

            <div style="font-size: 9px; opacity: 0.3; text-align: center; margin-top: 15px;">
              本測驗全程匿名、不記錄任何個人資料，僅供職涯參考。
            </div>

            <button onclick="location.reload()" style="background: none; border: none; color: #7aa8cc; font-size: 11px; margin-top: 20px; width: 100%; cursor: pointer; text-decoration: underline;">↺ 重新診斷</button>
          </div>
        </div>
      `;
    }

    function shareToIG(title, risk) {
      const text = `我在「職涯導航儀」測出的結果是：${title}（焦慮指數 ${risk}/10）！推薦大家也來測測看！ #浮島深聊 #職涯導航`;
      navigator.clipboard.writeText(text).then(() => {
        alert("✨ 已複製診斷結果！\n\n請截圖此頁面，開啟 Instagram 限動並貼上文字分享。");
        window.location.href = "instagram://camera"; 
      }).catch(() => {
        alert("請截圖此頁面分享至 Instagram 限動！");
      });
    }

    render();
  </script>
</body>
</html>
