<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職涯導航儀 | 浮島深聊 fudao-talk</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1628; --card: #0e2240; --card2: #112544; --accent: #4fa3e0; --text: #d4e8f5; --border: #1a3a5c;
  }
  body { 
    background-color: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; 
    margin: 0; display: flex; flex-direction: column; min-height: 100vh;
    background-image: radial-gradient(circle at 50% 0%, rgba(79, 163, 224, 0.05) 0%, transparent 70%);
  }
  
  /* Top Bar */
  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .brand-group { display: flex; align-items: center; gap: 8px; }
  .about-link { font-size: 11px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; transition: 0.3s; }
  .about-link:hover { background: rgba(79, 163, 224, 0.1); }

  /* Trust Anchor */
  .trust-anchor {
    background: rgba(79, 163, 224, 0.1); border-bottom: 1px solid rgba(79, 163, 224, 0.2);
    padding: 8px 0; text-align: center; font-size: 11px; color: var(--accent); letter-spacing: 1px;
  }

  main { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 15px; flex: 1; }
  
  /* 雙層卡片視覺 */
  .card-shell { border-radius: 16px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeIn 0.5s; }
  .card-top { background: var(--card); padding: 25px 20px; text-align: center; border: 1px solid var(--border); border-bottom: none; border-radius: 16px 16px 0 0; }
  .card-body { background: var(--card2); padding: 20px; border: 1px solid var(--border); border-radius: 0 0 16px 16px; }

  .opt-btn { 
    background: #0d1e38; border: 1px solid var(--border); padding: 15px; border-radius: 10px; 
    margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 15px; transition: 0.2s;
  }
  .opt-btn:hover { border-color: var(--accent); background: #112848; transform: translateX(5px); }

  /* 隱私聲明：強制出現在第一視覺區 */
  .privacy-sticky {
    margin: 15px auto; text-align: center; font-size: 11px; opacity: 0.5; line-height: 1.6; max-width: 400px;
  }

  footer { margin-top: 40px; padding: 30px 20px; text-align: center; border-top: 1px solid var(--border); opacity: 0.6; font-size: 11px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <header>
    <div class="brand-group">
      <span style="font-size: 18px;">🏝️</span>
      <div>
        <div style="font-weight: 900; font-size: 14px;">浮島深聊</div>
        <div style="font-size: 8px; font-family: 'DM Mono'; opacity: 0.5;">fudao-talk.lab</div>
      </div>
    </div>
    <a href="https://readdy.cc/preview/c0d8649c-b49c-415a-9346-9694f158f6f6/7217984/about" class="about-link" target="_blank">關於團隊</a>
  </header>

  <div class="trust-anchor">
    🛡️ 捷啟智慧科技 JC Tech 官方開發｜台南在地職涯研發團隊
  </div>

  <main id="app">
    </main>

  <div class="privacy-sticky">
    🔒 本診斷全程匿名，不蒐集個資、不記錄 IP，請放心測試。
  </div>

  <footer>
    <div style="font-weight: 700;">浮島深聊 · fudao-talk</div>
    <div style="margin-top: 4px;">技術支持：捷啟智慧科技 JC Tech</div>
    <div style="margin-top: 10px; opacity: 0.5; font-size: 9px;">© 2026 JC Tech. All Rights Reserved.</div>
  </footer>

  <script>
    const TARGET_URL = "https://readdy.cc/preview/c0d8649c-b49c-415a-9346-9694f158f6f6/7217984";
    const questions = [
      { emoji: "⚓", q: "您目前的求職狀態？", opts: ["新鮮人（應屆畢業）", "在職中，觀望新機會", "考慮離職中", "積極投遞履歷中", "準備面試中", "已拿到 Offer"] },
      { emoji: "🌊", q: "目前最感到困擾的是？", opts: ["薪資行情不明", "履歷投遞沒回音", "職涯方向迷茫", "面試表現不穩", "不清楚離職權益"] },
      { emoji: "🗺️", q: "您的工作年資？", opts: ["0年", "1–3年", "3–5年", "5–10年", "10年以上"] }
    ];

    let currentStep = 0;

    function render() {
      const q = questions[currentStep];
      document.getElementById('app').innerHTML = `
        <div class="card-shell">
          <div class="card-top">
            <div style="font-size: 38px; margin-bottom: 10px;">${q.emoji}</div>
            <div style="font-size: 20px; font-weight: 900; line-height: 1.4;">${q.q}</div>
          </div>
          <div class="card-body">
            ${q.opts.map(o => `<div class="opt-btn" onclick="next()">${o}<span>→</span></div>`).join('')}
            <div style="margin-top: 15px; font-size: 10px; opacity: 0.3; text-align: center; letter-spacing: 2px;">STEP 0${currentStep+1} / 03</div>
          </div>
        </div>
      `;
    }

    function next() {
      if (currentStep < questions.length - 1) {
        currentStep++; render();
      } else {
        document.getElementById('app').innerHTML = `<div style="padding: 100px 0; text-align: center;"><div style="width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div><p style="margin-top: 20px; opacity: 0.6; font-size: 13px;">正在分析數據...</p></div>`;
        setTimeout(showResult, 1200);
      }
    }

    function showResult() {
      const risk = 6;
      let segs = "";
      for(let i=1; i<=10; i++) {
        const color = i <= 4 ? "#4cc98a" : (i <= 7 ? "#4fa3e0" : "#e05c5c");
        segs += `<div style="height: 8px; width: 30px; border-radius: 2px; background:${i<=risk ? color : 'rgba(255,255,255,0.05)'}; box-shadow:${i<=risk ? '0 0 8px '+color+'44' : 'none'}"></div>`;
      }

      document.getElementById('app').innerHTML = `
        <div class="card-shell">
          <div class="card-top">
            <div style="font-size: 40px;">🎯</div>
            <div style="color:var(--accent); font-size:10px; font-weight:bold; letter-spacing:3px; margin-top:10px;">✦ 診斷完成 ✦</div>
            <div style="font-size: 28px; font-weight: 900; margin: 10px 0;">方向迷茫者</div>
            <p style="font-size: 14px; opacity: 0.7; line-height: 1.6;">診斷顯示，您目前的狀態正處於關鍵轉折點。建議透過「浮島測驗」進一步拆解核心優勢。</p>
          </div>
          <div class="card-body">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px; opacity:0.6;">
              <span>⚡ 緊迫指數評估</span><span style="color:var(--accent); font-weight:bold;">${risk} / 10</span>
            </div>
            <div style="display:flex; gap:4px; justify-content:center; margin-bottom:20px;">${segs}</div>
            
            <a href="${TARGET_URL}" target="_blank" style="display: block; background: var(--accent); color: white; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; font-size: 17px; box-shadow: 0 8px 20px rgba(79,163,224,0.3);">進入正式測驗 →</a>
            <button onclick="location.reload()" style="background: none; border: none; color: #7aa8cc; font-size: 12px; margin-top: 20px; width: 100%; cursor: pointer; text-decoration: underline;">↺ 重新診斷</button>
          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
